<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo_laye_deco.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laye Déco - Gestion</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0f1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.8s ease;
      }
      .loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255,255,255,0.1);
        border-top: 4px solid #6366f1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-logo {
        width: 80px;
        height: 80px;
        margin-bottom: 20px;
        object-fit: contain;
      }
      .loading-text {
        color: #94a3b8;
        margin-top: 20px;
        font-family: Arial, sans-serif;
        font-size: 16px;
        letter-spacing: 2px;
      }
      .loading-text span {
        color: #6366f1;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="loading-screen" id="loading-screen">
      <img src="/logo_laye_deco.png" alt="Laye Déco" class="loading-logo" />
      <div class="loading-spinner"></div>
      <div class="loading-text"><span>Laye</span> Déco</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('loading-screen').classList.add('hidden');
        }, 600);
      });
    </script>
  </body>
</html>
